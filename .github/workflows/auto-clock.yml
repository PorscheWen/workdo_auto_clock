name: Workdo 自動打卡

on:
  # 定時執行（使用 UTC 時間）
  schedule:
    # 上班打卡：每週一至週五 UTC 01:00 (台灣時間 09:00)
    - cron: '0 1 * * 1-5'
    # 下班打卡：每週一至週五 UTC 10:00 (台灣時間 18:00)
    - cron: '0 10 * * 1-5'
  
  # 允許手動觸發
  workflow_dispatch:
    inputs:
      action:
        description: '執行動作'
        required: true
        default: 'in'
        type: choice
        options:
          - in
          - out
          - status

env:
  WORKDO_EMAIL: ${{ secrets.WORKDO_EMAIL }}
  WORKDO_PASSWORD: ${{ secrets.WORKDO_PASSWORD }}
  WORKDO_COMPANY_ID: ${{ secrets.WORKDO_COMPANY_ID }}
  WORKDO_API_URL: ${{ secrets.WORKDO_API_URL }}

jobs:
  clock-in:
    runs-on: ubuntu-latest
    # 只在上班時間的 cron 或手動選擇 'in' 時執行
    if: |
      (github.event.schedule == '0 1 * * 1-5') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'in')
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      - name: 執行上班打卡
        run: |
          python workdo_auto_clock.py in
      
      - name: 上傳日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock-in-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

  clock-out:
    runs-on: ubuntu-latest
    # 只在下班時間的 cron 或手動選擇 'out' 時執行
    if: |
      (github.event.schedule == '0 10 * * 1-5') || 
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'out')
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      - name: 執行下班打卡
        run: |
          python workdo_auto_clock.py out
      
      - name: 上傳日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clock-out-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

  check-status:
    runs-on: ubuntu-latest
    # 只在手動選擇 'status' 時執行
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'status'
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      - name: 查詢打卡狀態
        run: |
          python workdo_auto_clock.py status
