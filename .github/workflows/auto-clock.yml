name: Workdo 自動打卡

on:
  # 定時執行（使用 UTC 時間）
  schedule:
    # 上班打卡：每週一至週五 UTC 00:30 (台灣時間 08:30)
    - cron: '30 0 * * 1-5'
    # 下班打卡：每週一至週五 UTC 08:00 (台灣時間 16:00)
    - cron: '0 8 * * 1-5'
  
  # 允許手動觸發
  workflow_dispatch:
    inputs:
      action:
        description: '執行動作'
        required: true
        default: 'auto'
        type: choice
        options:
          - in
          - out
          - status
          - check-missing
          - auto
          - update-holidays

env:
  WORKDO_EMAIL: ${{ secrets.WORKDO_EMAIL }}
  WORKDO_PASSWORD: ${{ secrets.WORKDO_PASSWORD }}
  WORKDO_GPS_LOCATION: ${{ secrets.WORKDO_GPS_LOCATION }}
  WORKDO_GPS_PLACE: ${{ secrets.WORKDO_GPS_PLACE }}
  WORKDO_USE_LEAVE_API: ${{ secrets.WORKDO_USE_LEAVE_API }}
  LEAVE_DAYS_JSON: ${{ secrets.LEAVE_DAYS_JSON }}

jobs:
  auto-clock:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v5
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      # 使用 $LEAVE_DAYS_JSON 寫檔，避免 echo '...' 在 JSON 含單引號時被 shell 截斷
      - name: 建立請假日設定檔
        if: env.LEAVE_DAYS_JSON != ''
        run: |
          printf '%s\n' "$LEAVE_DAYS_JSON" > leave_days.json
      
      - name: 驗證 LEAVE_DAYS_JSON 可解析
        if: env.LEAVE_DAYS_JSON != ''
        run: |
          python -c "import json; json.load(open('leave_days.json')); print('LEAVE_DAYS_JSON 格式正確')"
      
      - name: 合併台灣國定假日至 leave_days.json（與 Secret 並用）
        run: python workdo_auto_clock.py update-holidays-tw
      
      - name: 驗證合併後 leave_days.json
        run: |
          test -f leave_days.json
          python -c "import json; d=json.load(open('leave_days.json')); print('合併後共', len(d), '筆假日')"
      
      - name: 顯示 update-holidays-tw 合併結果
        run: |
          python << 'EOF'
          import json
          import os
          with open("leave_days.json", encoding="utf-8") as f:
              data = json.load(f)
          sm = os.environ.get("GITHUB_STEP_SUMMARY")
          if sm:
              with open(sm, "a", encoding="utf-8") as s:
                  s.write("## 🗓️ update-holidays-tw 合併結果\n\n")
                  s.write(f"- 共 **{len(data)}** 筆（台灣行事曆 + `LEAVE_DAYS_JSON` Secret）\n\n")
                  s.write("```json\n")
                  s.write(json.dumps(data, ensure_ascii=False, indent=2))
                  s.write("\n```\n")
          print("===== leave_days.json（update-holidays-tw 後）=====")
          print(json.dumps(data, ensure_ascii=False, indent=2))
          EOF
      
      - name: 判斷執行動作
        id: determine-action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 0 * * 1-5" ]; then
            echo "action=in" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 8 * * 1-5" ]; then
            echo "action=out" >> $GITHUB_OUTPUT
          else
            echo "action=auto" >> $GITHUB_OUTPUT
          fi
      
      - name: 執行打卡
        run: |
          python workdo_auto_clock.py ${{ steps.determine-action.outputs.action }}
      
      - name: 顯示本次 job 結束後 leave_days.json（含 Workdo update-holidays）
        if: always()
        run: |
          python << 'EOF'
          import json
          import os
          import sys
          path = "leave_days.json"
          sm = os.environ.get("GITHUB_STEP_SUMMARY")
          if not os.path.isfile(path):
              msg = "（無 leave_days.json，可能於合併步驟失敗）"
              print(msg)
              if sm:
                  with open(sm, "a", encoding="utf-8") as s:
                      s.write("\n## 📋 job 結束後假日檔\n\n")
                      s.write(msg + "\n")
              sys.exit(0)
          with open(path, encoding="utf-8") as f:
              data = json.load(f)
          if sm:
              with open(sm, "a", encoding="utf-8") as s:
                  s.write("\n## 📋 job 結束後 leave_days.json\n\n")
                  s.write("- 若動作為 **update-holidays**，此為 Workdo API 寫回後之內容。\n\n")
                  s.write("```json\n")
                  s.write(json.dumps(data, ensure_ascii=False, indent=2))
                  s.write("\n```\n")
          print("===== leave_days.json（job 結束後）=====")
          print(json.dumps(data, ensure_ascii=False, indent=2))
          EOF
      
      - name: 上傳日誌
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workdo-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

