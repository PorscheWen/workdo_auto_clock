name: Workdo 自動打卡

on:
  # 定時執行（使用 UTC 時間）
  schedule:
    # 上班打卡：每週一至週五 UTC 00:30 (台灣時間 08:30)
    - cron: '30 0 * * 1-5'
    # 下班打卡：每週一至週五 UTC 10:00 (台灣時間 18:00)
    - cron: '0 10 * * 1-5'
  
  # 允許手動觸發
  workflow_dispatch:
    inputs:
      action:
        description: '執行動作'
        required: true
        default: 'auto'
        type: choice
        options:
          - in
          - out
          - status
          - check-missing
          - auto
          - update-holidays

env:
  WORKDO_EMAIL: ${{ secrets.WORKDO_EMAIL }}
  WORKDO_PASSWORD: ${{ secrets.WORKDO_PASSWORD }}
  WORKDO_GPS_LOCATION: ${{ secrets.WORKDO_GPS_LOCATION }}
  WORKDO_GPS_PLACE: ${{ secrets.WORKDO_GPS_PLACE }}
  WORKDO_USE_LEAVE_API: ${{ secrets.WORKDO_USE_LEAVE_API }}
  LEAVE_DAYS_JSON: ${{ secrets.LEAVE_DAYS_JSON }}
  # 使用 Node.js 24 避免棄用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-clock:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      - name: 建立請假日設定檔
        if: env.LEAVE_DAYS_JSON != ''
        run: |
          echo '${{ secrets.LEAVE_DAYS_JSON }}' > leave_days.json
      
      - name: 合併台灣國定假日至 leave_days.json（與 Secret 並用）
        run: python workdo_auto_clock.py update-holidays-tw
      
      - name: 判斷執行動作
        id: determine-action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "30 0 * * 1-5" ]; then
            echo "action=in" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 10 * * 1-5" ]; then
            echo "action=out" >> $GITHUB_OUTPUT
          else
            echo "action=auto" >> $GITHUB_OUTPUT
          fi
      
      - name: 執行打卡
        run: |
          python workdo_auto_clock.py ${{ steps.determine-action.outputs.action }}
      
      - name: 上傳日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workdo-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7

