name: 更新假日資料

on:
  # 定時執行（使用 UTC 時間）
  schedule:
    # 每週一 UTC 00:00 (台灣時間 08:00)
    - cron: '0 0 * * 1'
  
  # 允許手動觸發
  workflow_dispatch:

env:
  WORKDO_EMAIL: ${{ secrets.WORKDO_EMAIL }}
  WORKDO_PASSWORD: ${{ secrets.WORKDO_PASSWORD }}
  WORKDO_GPS_LOCATION: ${{ secrets.WORKDO_GPS_LOCATION }}
  WORKDO_GPS_PLACE: ${{ secrets.WORKDO_GPS_PLACE }}
  WORKDO_USE_LEAVE_API: ${{ secrets.WORKDO_USE_LEAVE_API }}
  LEAVE_DAYS_JSON: ${{ secrets.LEAVE_DAYS_JSON }}

jobs:
  update-holidays:
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v5
      
      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安裝依賴套件
        run: |
          pip install -r requirements.txt
      
      - name: 驗證環境變數
        run: |
          echo "🔍 檢查必要的環境變數..."
          if [ -z "$WORKDO_EMAIL" ]; then
            echo "❌ WORKDO_EMAIL 未設定"
            exit 1
          else
            echo "✅ WORKDO_EMAIL 已設定"
          fi
          if [ -z "$WORKDO_PASSWORD" ]; then
            echo "❌ WORKDO_PASSWORD 未設定"
            exit 1
          else
            echo "✅ WORKDO_PASSWORD 已設定"
          fi
          echo "📊 其他環境變數狀態:"
          echo "   WORKDO_USE_LEAVE_API: ${WORKDO_USE_LEAVE_API:-未設定}"
          echo "   WORKDO_GPS_LOCATION: ${WORKDO_GPS_LOCATION:+已設定}"
          echo "   WORKDO_GPS_PLACE: ${WORKDO_GPS_PLACE:+已設定}"
      
      - name: 建立現有請假日設定檔
        if: env.LEAVE_DAYS_JSON != ''
        run: |
          printf '%s\n' "$LEAVE_DAYS_JSON" > leave_days.json
          python -c "import json; json.load(open('leave_days.json'))"
          echo "📝 已載入現有請假日設定（JSON 已驗證）"
      
      - name: 從台灣政府公開資料更新假日
        run: |
          python workdo_auto_clock.py update-holidays-tw 2>&1 | tee update-holidays.log
          echo "📊 執行結果: 退出碼 = $?"
      
      - name: 檢查生成的文件
        if: always()
        run: |
          echo "📁 當前目錄檔案列表:"
          ls -lah
          echo ""
          if [ -f leave_days.json ]; then
            echo "✅ leave_days.json 已生成"
            echo "📄 檔案大小: $(wc -c < leave_days.json) bytes"
            echo "📋 檔案內容:"
            cat leave_days.json
          else
            echo "❌ leave_days.json 未生成"
          fi
          echo ""
          if [ -f update-holidays.log ]; then
            echo "📝 完整執行日誌:"
            cat update-holidays.log
          fi
      
      - name: 顯示更新後的假日資料
        if: always()
        run: |
          if [ -f leave_days.json ]; then
            echo "📅 更新後的假日資料:"
            cat leave_days.json
          else
            echo "⚠️ leave_days.json 不存在"
          fi
      
      - name: 寫入 Actions Summary（update-holidays 結果）
        if: always()
        run: |
          python << 'EOF'
          import json
          import os
          sm = os.environ.get("GITHUB_STEP_SUMMARY")
          if not sm:
              print("GITHUB_STEP_SUMMARY 未設定，略過 Summary")
              raise SystemExit(0)
          lines = []
          lines.append("## 🗓️ update-holidays 執行結果\n")
          if os.path.isfile("leave_days.json"):
              with open("leave_days.json", encoding="utf-8") as f:
                  data = json.load(f)
              lines.append(f"- **leave_days.json**：共 {len(data)} 筆\n\n")
              lines.append("```json\n")
              lines.append(json.dumps(data, ensure_ascii=False, indent=2))
              lines.append("\n```\n\n")
          else:
              lines.append("- **leave_days.json**：未產生\n\n")
          log_path = "update-holidays.log"
          if os.path.isfile(log_path):
              with open(log_path, encoding="utf-8", errors="replace") as f:
                  tail = f.readlines()[-120:]
              lines.append("<details><summary>update-holidays-tw 日誌（末 120 行）</summary>\n\n")
              lines.append("```\n")
              lines.extend(tail)
              lines.append("\n```\n\n</details>\n")
          with open(sm, "a", encoding="utf-8") as s:
              s.write("".join(lines))
          print("已寫入 Job Summary（Actions 執行結果 → Summary）")
          EOF
      
      - name: 上傳更新後的假日資料
        if: success()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: leave-days-${{ github.run_number }}
          path: leave_days.json
          retention-days: 30
          if-no-files-found: warn
      
      - name: 上傳日誌
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: update-holidays-log-${{ github.run_number }}
          path: |
            *.log
          retention-days: 7
          if-no-files-found: warn

